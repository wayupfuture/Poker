const RANKS=[
  {name:'新手', emoji:'🃏', threshold:0,      color:'#7a9a84'},
  {name:'学徒', emoji:'⚔️',  threshold:3000,   color:'#7BB86A'},

function getNextRank(){const w=S.stats.totalChipsWon;for(const x of RANKS){if(w<x.threshold)return x;}return null;}

// ═══════════════════════════════════════
// DECK & HAND UTILS
// ═══════════════════════════════════════
const fullDeck=()=>SUITS.flatMap(s=>VALUES.map(v=>({suit:s,value:v})));
const cardKey=c=>c.value+c.suit;
const _rnd=n=>{try{const b=new Uint32Array(1);crypto.getRandomValues(b);return b[0]%n}catch(e){return Math.floor(Math.random()*n)}};
const shuffle=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=_rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a};
const deckExcluding=(...g)=>{const u=new Set(g.flat().map(cardKey));return fullDeck().filter(c=>!u.has(cardKey(c)))};
function combos(arr,k){if(k===0)return[[]];if(arr.length<k)return[];const[h,...t]=arr;return[...combos(t,k-1).map(c=>[h,...c]),...combos(t,k)]}
function score5(cards){
  const vals=cards.map(c=>VAL_NUM[c.value]).sort((a,b)=>b-a);
  const vc={};vals.forEach(v=>vc[v]=(vc[v]||0)+1);
  const counts=Object.values(vc).sort((a,b)=>b-a);
  const flush=new Set(cards.map(c=>c.suit)).size===1;
  const uv=[...new Set(vals)].sort((a,b)=>b-a);
  const str=uv.length===5&&uv[0]-uv[4]===4;
  const wheel=JSON.stringify(uv)==='[14,5,4,3,2]';

  // Encode an ordered array of values into a single comparable number (base-15)
  // This makes kicker comparison automatic and correct
  const enc=arr=>arr.reduce((s,v,i)=>s+v*Math.pow(15,arr.length-1-i),0);

  // Group vals by count for ordered extraction
  const byCount=(n)=>Object.keys(vc).filter(k=>vc[k]===n).map(Number).sort((a,b)=>b-a);

  if(flush&&str&&vals[0]===14)return{r:9e9,n:'同花大顺',t:9};
  if(flush&&(str||wheel)){
    const top=wheel?5:vals[0];
    return{r:8e8+top,n:'同花顺',t:8};
  }
  if(counts[0]===4){
    const q=byCount(4)[0],k=byCount(1)[0];
    return{r:7e8+enc([q,k]),n:'四条',t:7};
  }
  if(counts[0]===3&&counts[1]===2){
    const q=byCount(3)[0],p=byCount(2)[0];
    return{r:6e8+enc([q,p]),n:'葫芦',t:6};
  }
  if(flush)return{r:5e8+enc(vals),n:'同花',t:5};
  if(str||wheel){
    const top=wheel?5:vals[0];
    return{r:4e8+top,n:'顺子',t:4};
  }
  if(counts[0]===3){
    const q=byCount(3)[0];const ks=byCount(1);
    return{r:3e8+enc([q,...ks]),n:'三条',t:3};
  }
  if(counts[0]===2&&counts[1]===2){
    const ps=byCount(2);const k=byCount(1)[0];
    return{r:2e8+enc([ps[0],ps[1],k]),n:'两对',t:2};
  }
  if(counts[0]===2){
    const p=byCount(2)[0];const ks=byCount(1);
    return{r:1e8+enc([p,...ks]),n:'一对',t:1};
  }
  return{r:enc(vals),n:'高牌',t:0};
}
function evalHand(cards){
  if(cards.length<2)return{r:0,n:'无牌',t:-1};
  if(cards.length<5){const vals=cards.map(c=>VAL_NUM[c.value]).sort((a,b)=>b-a);const vc={};vals.forEach(v=>vc[v]=(vc[v]||0)+1);if(Object.values(vc).includes(2)){const p=+Object.keys(vc).find(k=>vc[k]===2);return{r:1000+p,n:'一对',t:1}}return{r:vals[0],n:'高牌',t:0}}
  return combos(cards,5).reduce((b,c)=>{const s=score5(c);return s.r>b.r?s:b},{r:-1,n:'无牌',t:-1});
}
function calcEquity(myCards, comm, opponents=2, N=600){
  // Equity vs UNKNOWN opponents - we don't use AI hole cards here.
  // Player cannot see opponent cards, so probability must reflect that uncertainty.
  // Only exclude: player's own cards + community cards already on board.
  if(myCards.length<2) return 50;
  const rem=deckExcluding([...myCards,...comm]);

  // ── Flop: exact enumeration over all turn+river combos, random opponents ──
  if(comm.length===3){
    let wins=0,ties=0,total=0;
    for(let i=0;i<rem.length;i++){
      for(let j=i+1;j<rem.length;j++){
        const board=[...comm,rem[i],rem[j]];
        // Sample random opponents from cards not on board (approximate but fair)
        const oppRem=rem.filter((_,k)=>k!==i&&k!==j);
        if(oppRem.length<opponents*2) continue;
        const sh=shuffle(oppRem);
        const opp=Array.from({length:opponents},(_,k)=>[sh[k*2],sh[k*2+1]]);
        const my=evalHand([...myCards,...board]).r;
        const mx=Math.max(...opp.map(h=>evalHand([...h,...board]).r));
        if(my>mx) wins++;
        else if(my===mx){
          const oppScores=opp.map(h=>evalHand([...h,...board]).r);
          if(!oppScores.some(s=>s>my)) ties+=1/(oppScores.filter(s=>s===my).length+1);
        }
        total++;
      }
    }
    return total>0?Math.round((wins+ties)/total*100):50;
  }

  // ── Turn: exact over river cards, random opponents ──
  if(comm.length===4){
    let wins=0,ties=0;
    for(const river of rem){
      const board=[...comm,river];
      const oppRem=rem.filter(c=>c!==river);
      if(oppRem.length<opponents*2) continue;
      const sh=shuffle(oppRem);
      const opp=Array.from({length:opponents},(_,k)=>[sh[k*2],sh[k*2+1]]);
      const my=evalHand([...myCards,...board]).r;
      const mx=Math.max(...opp.map(h=>evalHand([...h,...board]).r));
      if(my>mx) wins++;
      else if(my===mx){
        const oppScores=opp.map(h=>evalHand([...h,...board]).r);
        if(!oppScores.some(s=>s>my)) ties+=1/(oppScores.filter(s=>s===my).length+1);
      }
    }
    return rem.length>0?Math.round((wins+ties)/rem.length*100):50;
  }

  // ── Preflop / River: Monte Carlo N=600 ──
  let wins=0,ties=0;
  for(let i=0;i<N;i++){
    const sh=shuffle(rem);let idx=0;
    const opp=Array.from({length:opponents},()=>[sh[idx++],sh[idx++]]);
    const board=[...comm];
    while(board.length<5) board.push(sh[idx++]);
    if(board.length!==5) continue;
    const my=evalHand([...myCards,...board]).r;
    const oppScores=opp.map(h=>evalHand([...h,...board]).r);
    const mx=Math.max(...oppScores);
    if(my>mx) wins++;
    else if(my===mx){
      const beatCount=oppScores.filter(s=>s>my).length;
      if(beatCount===0) ties+=1/(oppScores.filter(s=>s===my).length+1);
    }
  }
  return Math.round((wins+ties)/N*100);
}
function calcOuts(myCards,comm){
  if(comm.length<3)return null;
  const remDeck=deckExcluding([...myCards,...comm]);
  const cur=evalHand([...myCards,...comm]);
  const outCards=remDeck.filter(c=>evalHand([...myCards,...comm,c]).r>cur.r);
  const groups={};outCards.forEach(c=>{const imp=evalHand([...myCards,...comm,c]);groups[imp.n]=(groups[imp.n]||0)+1});
  const sl=comm.length===3?2:1; // streets left
  const n=remDeck.length;  // unknown cards
  const o=outCards.length; // outs count
  let prob;
  if(sl===2){
    // Exact: P(hit turn OR river) = 1 - C(n-o,2)/C(n,2)
    // = 1 - (n-o)(n-o-1) / (n(n-1))
    prob=n>1?Math.round((1-(n-o)*(n-o-1)/(n*(n-1)))*100):0;
  } else {
    // Exact: P(hit river) = o/n
    prob=n>0?Math.round(o/n*100):0;
  }
  prob=Math.min(Math.max(prob,0),99);
  // Also compute rule-of-4/2 approximation for display
  const approx=Math.min(o*(sl===2?4:2),98);
  return{count:o,prob,approxProb:approx,groups,streetsLeft:sl};
}
function calcNuts(comm){
  if(comm.length<3)return null;
  const rem=deckExcluding(comm);let best={r:-1,n:'无',t:-1,hand:[]};
  for(const pair of combos(rem,2)){const s=evalHand([...pair,...comm]);if(s.r>best.r)best={...s,hand:pair}}
  return best;
}
function getBetAdvice(equity,outs,handT,toCall,pot,playerChips){
  const potOddsPct=toCall>0?Math.round(toCall/(pot+toCall)*100):0;
  const hasOuts=outs&&outs.count>0;
  if(handT>=6)return{action:'raise',label:'强力加注',color:'#FFD700',amount:Math.min(Math.round(pot*.75),playerChips),reason:`强牌价值下注榨取筹码！`};
  if(handT>=4)return{action:'raise',label:'适度加注',color:'#44CC77',amount:Math.min(Math.round(pot*.5),playerChips),reason:'中强牌，主动加注建立优势。'};
  if(equity>=60)return{action:'raise',label:'价值下注',color:'#44CC77',amount:Math.min(Math.round(pot*.4),playerChips),reason:`胜率 ${equity}%，有优势，可以加注。`};
  if(toCall===0){if(hasOuts&&outs.prob>=20)return{action:'check',label:'免费看牌',color:'#4A9EFF',amount:0,reason:`有 ${outs.count} 张 outs，免费等机会。`};return{action:'check',label:'过牌观望',color:'#4A9EFF',amount:0,reason:'手牌一般，过牌最安全。'}}
  if(equity>=potOddsPct+5&&hasOuts)return{action:'call',label:'值得跟注',color:'#4A9EFF',amount:toCall,reason:`胜率(${equity}%)高于赔率(${potOddsPct}%)。`};
  if(equity>=50)return{action:'call',label:'跟注可行',color:'#88AAFF',amount:toCall,reason:`胜率约 ${equity}%，可以跟注。`};
  if(hasOuts&&outs.prob>=15&&equity>=potOddsPct-5)return{action:'call',label:'听牌跟注',color:'#FF8C42',amount:toCall,reason:`${outs.count} 张 outs，约 ${outs.prob}% 改善率。`};
  return{action:'fold',label:'建议弃牌',color:'#FF6655',amount:0,reason:`胜率仅 ${equity}%，不划算。`};
}

// ═══════════════════════════════════════
function pickLine(p,key){const arr=p.lines[key]||p.lines.call;return arr[Math.floor(Math.random()*arr.length)]}
function sizeBet(p,pot,curBet,chips,handT=0,street='flop',ovr=1.0){
  const m=p.betSizing[Math.floor(Math.random()*p.betSizing.length)];
  const sm={pre:.9,flop:1.0,turn:1.18,river:1.35}[street]||1.0;
  const stm=.75+(handT/9)*.70;const spr=chips/Math.max(pot,1);
  const sprm=spr<3?1.4:spr<6?1.15:spr<12?1.0:.88;
  const v=.84+Math.random()*.30;
  const raw=Math.round((pot*m*sm*stm*sprm*ovr*v)/5)*5;
  return Math.min(Math.max(raw,curBet+20),chips);
}
function mkRaise(p,pot,curBet,chips,lk,handT=0,street='flop',why='',ovr=1.0){return{action:'raise',amount:sizeBet(p,pot,curBet,chips,handT,street,ovr),comment:pickLine(p,lk),_why:why}}
function mkCall(tc,p,lk,why=''){return{action:'call',amount:tc,comment:pickLine(p,lk),_why:why}}
function mkFold(p,lk,why=''){return{action:'fold',comment:pickLine(p,lk),_why:why}}
function mkCheck(p,why=''){return{action:'call',amount:0,comment:pickLine(p,'check'),_why:why}}

function makeAiDecision(ai,comm,pot,curBet){
  const p=PERSONAS[ai.id];if(!p)return{action:'call',amount:0,comment:''};
  const toCall=Math.max(0,curBet-ai.bet);
  const hand=evalHand([...ai.cards,...comm]);const t=hand.t;
  const R=()=>Math.random();
  const phase=comm.length===0?'pre':comm.length===3?'flop':comm.length===4?'turn':'river';
  const si={pre:0,flop:1,turn:2,river:3}[phase];
  const spr=ai.chips/Math.max(pot,1);
  const seat=['gpt4','gemini','llama','claude','grok'].indexOf(ai.id);
  const posBoost=(seat/4)*p.positionAdj;
  const effAgg=Math.min(.97,p.aggression*(p.streetAgg[si]??1.0)+posBoost);
  const tilted=p.tiltable&&ai.chips<800;const tm=tilted?1.35:1.0;
  const isShort=spr<4;
  const potOdds=toCall>0?toCall/(pot+toCall):0;
  const potOddsPct=Math.round(potOdds*100);
  const why=r=>`[${hand.n}·T${t}] ${phase}·位置${seat}·SPR${spr.toFixed(1)}｜${r}`;

  if(phase==='pre'){
    // Preflop hand strength (0-8 scale):
    // Premium: AA/KK/QQ/AKs=8, JJ/TT/AQs/AKo=7, 99/88/AJs/KQs=6
    // Playable: 77-55/AT+/KJ+/QJs=5-4, Suited connectors=3, Broadways=3
    // Fold: everything else = 0-1
    const [c1,c2]=ai.cards;
    const v1=VAL_NUM[c1.value],v2=VAL_NUM[c2.value];
    const hi=Math.max(v1,v2),lo=Math.min(v1,v2);
    const suited=c1.suit===c2.suit,paired=v1===v2;
    const gap=hi-lo;
    let pfStr=0; // preflop strength
    if(paired){pfStr=hi>=14?8:hi>=12?7:hi>=10?6:hi>=8?5:hi>=6?4:3;}
    else if(hi===14){pfStr=suited?(lo>=13?8:lo>=12?7:lo>=11?6:lo>=10?5:lo>=9?4:2):(lo>=13?7:lo>=12?6:lo>=10?5:lo>=9?4:2);}
    else if(hi===13){pfStr=suited?(lo>=12?6:lo>=11?5:lo>=10?4:lo>=9?3:2):(lo>=12?5:lo>=11?4:lo>=10?3:2);}
    else if(hi===12){pfStr=suited?(lo>=11?5:lo>=10?4:lo>=9?3:2):(lo>=11?4:lo>=10?3:2);}
    else if(suited&&gap<=1&&hi>=9){pfStr=3;}
    else if(suited&&gap<=2&&hi>=8){pfStr=2;}
    else{pfStr=1;}
    // Raise threshold based on position & pfStr
    // Late position (seat 3-4) widens RAISE range only, not call range
    const posAdj=seat>=3?1:0;
    const playThresh=p.pfPlay||3;  // fixed: position doesn't loosen call range
    const raiseThresh=Math.max(playThresh+1,(p.pfRaise||6)-posAdj);
    if(pfStr>=raiseThresh){
      if(R()<p.threeBetFreq*tm||toCall===0)return mkRaise(p,pot,curBet,ai.chips,'strong',pfStr,phase,why(`强牌开局 pfStr${pfStr}`));
      return mkCall(toCall,p,'call',why(`强牌跟注 pfStr${pfStr}`));
    }
    if(pfStr>=playThresh){
      if(toCall===0&&R()<effAgg*.6)return mkRaise(p,pot,curBet,ai.chips,'bluff',pfStr,phase,why(`中等牌加注 pfStr${pfStr}`));
      if(toCall>0&&toCall>curBet*.6&&R()<p.foldTo3bet*.8)return mkFold(p,'fold',why(`中等牌面对大注 pfStr${pfStr}`));
      return mkCall(toCall||0,p,'call',why(`中等牌入池 pfStr${pfStr}`));
    }
    // Weak hand: fold most of the time, occasionally bluff-limp if loose
    if(toCall===0&&R()<p.preflopCont*.15*tm)return mkCall(0,p,'call',why(`垃圾牌limp pfStr${pfStr}`));
    return mkFold(p,'fold',why(`垃圾牌弃牌 pfStr${pfStr}`));
  }
  if(isShort){if(t>=2||(tilted&&R()<.6))return mkRaise(p,pot,curBet,ai.chips,t>=2?'strong':'bluff',t,phase,why(`短筹码All-in`));if(potOdds<.3)return mkCall(toCall,p,'call',why('短筹码·赔率可'));return mkFold(p,'fold',why('短筹码·弃牌'))}
  if(t>=6){if(R()<p.slowPlay){if(toCall===0)return mkCheck(p,why('怪兽慢打'));return mkCall(toCall,p,'strong',why('怪兽慢跟'))}return mkRaise(p,pot,curBet,ai.chips,'strong',t,phase,why('怪兽快打'),1.25)}
  if(t>=4){if(toCall===0){if(R()<effAgg*.82)return mkRaise(p,pot,curBet,ai.chips,'strong',t,phase,why('顺/同花·价值'));return mkCheck(p,why('顺/同花·诱骗'))}if(R()<effAgg*.52)return mkRaise(p,pot,curBet,ai.chips,'reraise',t,phase,why('顺/同花·反加'));return mkCall(toCall,p,'call',why('顺/同花·跟注'))}
  if(t===3){if(toCall===0){if(R()<p.slowPlay*.9)return mkCheck(p,why('三条·check-raise陷阱'));return mkRaise(p,pot,curBet,ai.chips,'strong',t,phase,why('三条·下注'))}if(R()<effAgg*.75+.2)return mkRaise(p,pot,curBet,ai.chips,'reraise',t,phase,why('三条check-raise！'));return mkCall(toCall,p,'call',why('三条·慢跟'))}
  if(t===2){if(toCall===0){if(R()<effAgg*.72)return mkRaise(p,pot,curBet,ai.chips,'strong',t,phase,why('两对·下注'));return mkCheck(p,why('两对·诱骗'))}if(R()<effAgg*.48&&phase!=='pre')return mkRaise(p,pot,curBet,ai.chips,'reraise',t,phase,why('两对·反加'));if(potOdds<.38||R()>p.panicFold)return mkCall(toCall,p,'call',why(`两对·跟注·赔率${potOddsPct}%`));return mkFold(p,'fold',why('两对·弃牌'))}
  if(t===1){if(toCall===0){if(R()<p.donkFreq*tm)return mkRaise(p,pot,curBet,ai.chips,'strong',t,phase,why(`donk下注`));if(R()<effAgg*.36)return mkRaise(p,pot,curBet,ai.chips,'strong',t,phase,why('一对·试探'));return mkCheck(p,why('一对·过牌'))}
    const ratio=toCall/Math.max(pot,1);
    // Fold probability scales with bet size + persona; base is low for small bets
    const opTightness=p.panicFold-p.bluffFreq*0.25;
    const baseFoldProb=Math.min(0.92, ratio*1.2 + Math.max(0,opTightness)*0.4);
    const foldNoise=R()*0.25-0.12; // ±12% random variance
    const foldProb=Math.min(0.95,Math.max(0,baseFoldProb+foldNoise));
    if(R()<foldProb)return mkFold(p,'fold',why(`一对·弃牌 ratio=${ratio.toFixed(2)}`));
    if(seat>=3&&spr>8&&R()<.38)return mkCall(toCall,p,'call',why('一对·浮注'));
    return mkCall(toCall,p,'call',why(`一对·跟注`));}
  if(toCall===0){const ct=p.cBetFreq*tm*(phase==='flop'?1.0:phase==='turn'?.6:.4);if(R()<ct)return mkRaise(p,pot,curBet,ai.chips,'bluff',t,phase,why(`c-bet`));if(R()<p.donkFreq*tm)return mkRaise(p,pot,curBet,ai.chips,'bluff',t,phase,why('donk蒙'));return mkCheck(p,why('高牌·过牌'))}
  // High card facing a bet: fold scales with bet size + persona tightness
  const ratio=toCall/Math.max(pot,1);
  // Tightness factor: panicFold drives fold tendency, bluffFreq = call-bluff tendency
  const tightness=p.panicFold-p.bluffFreq*0.3; // gemini=+0.39, grok=-0.09
  // Fold prob rises with bet size; base is near 0 for tiny bets
  const hcFoldBase=Math.min(0.95, ratio*1.5 + Math.max(0,tightness)*0.5);
  const hcFoldProb=Math.min(0.95,Math.max(0, hcFoldBase + R()*0.22-0.11));
  if(phase==='river'&&R()<p.bluffFreq*.5*tm)return mkRaise(p,pot,curBet,ai.chips,'bluff',t,phase,why('河牌蒙'));
  if(tilted&&R()<.35)return mkCall(toCall,p,'call',why('倾斜·跟注'));
  if(R()<hcFoldProb)return mkFold(p,'fold',why(`高牌·弃牌 ratio=${ratio.toFixed(2)}`));
  return mkCall(toCall,p,'call',why('高牌·侥幸跟注'));
}

function fmtChips(n){
  if(n>=1000000)return(n/1000000).toFixed(1).replace('.0','')+' M';
  if(n>=10000)return(n/1000).toFixed(1).replace('.0','')+' K';
  if(n>=1000)return(n/1000).toFixed(1).replace('.0','')+' K';
  return n.toLocaleString();
}

let _pkrCtx=null;
function _getCtx(){
  if(!S.soundOn)return null;
  try{return _pkrCtx||(_pkrCtx=new(window.AudioContext||window.webkitAudioContext)());}catch(e){return null;}
}
function _beep(freq,dur=0.08,vol=0.18,wave='sine',delay=0){
  const ctx=_getCtx();if(!ctx)return;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=wave;o.frequency.value=freq;
  const t=ctx.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.05);
}
function snd(type){
  if(type==='deal'){_beep(880,0.04,0.1,'triangle')}
  else if(type==='win'){[523,659,784,1047].forEach((f,i)=>_beep(f,0.18,0.18,'sine',i*0.09));}
  else if(type==='lose'){[350,280,210].forEach((f,i)=>_beep(f,0.18,0.13,'sine',i*0.1));}
  else if(type==='click'){_beep(600,0.03,0.1,'square');}
  else if(type==='fold'){_beep(280,0.1,0.12,'sine');}
  else if(type==='raise'){_beep(720,0.04,0.12,'sawtooth');}
  else if(type==='ach'){[800,1000,1260].forEach((f,i)=>_beep(f,0.16,0.2,'sine',i*0.1));}
}

const _SK='pkr_v5';
const _defaultStats=()=>({totalWins:0,totalLosses:0,winStreak:0,bestStreak:0,totalChipsWon:0,chipHistory:[3000],achievements:[]});

// Detect which storage backend is available
const _useClaudeStorage=typeof window.storage==='object'&&typeof window.storage.get==='function';

async function loadStats(){
  // 1) Try Claude artifact storage (window.storage)
  if(_useClaudeStorage){
    try{
      const r=await window.storage.get(_SK);
      if(r&&r.value){const s=JSON.parse(r.value);if(s&&typeof s.totalWins==='number')return s;}
    }catch(e){}
  }
  // 2) Fall back to localStorage (GitHub Pages / local file)
  try{
    const s=JSON.parse(localStorage.getItem(_SK)||'null');
    if(s&&typeof s.totalWins==='number')return s;
  }catch(e){}
  return _defaultStats();
}

async function saveStats(){
  const str=JSON.stringify(S.stats);
  // Write to both backends so data survives environment switches
  if(_useClaudeStorage){
    try{await window.storage.set(_SK,str);}catch(e){}
  }
  try{localStorage.setItem(_SK,str);}catch(e){}
}

function chipChartSVG(hist){
  if(!hist||hist.length<2)return`<div style="color:#2a4a34;font-size:11px;text-align:center;padding:14px 0">再打几局后显示筹码走势图 📈</div>`;
  const W=268,H=72,P=4;
  const mn=Math.min(...hist),mx=Math.max(...hist);
  const rng=Math.max(mx-mn,200);
  const px=i=>P+(i/(Math.max(hist.length-1,1)))*(W-P*2);
  const py=v=>H-P-((v-mn)/rng)*(H-P*2);
  const pts=hist.map((v,i)=>`${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  const last=hist[hist.length-1],first=hist[0];
  const col=last>=first?'#44CC77':'#FF6655';
  const baselineY=py(3000);
  const showBase=mn<=3000&&mx>=3000;
  return`<div style="padding:2px 0 8px">
  <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;height:72px">
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${col}" stop-opacity=".28"/>
        <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${showBase?`<line x1="${P}" y1="${baselineY.toFixed(1)}" x2="${(W-P)}" y2="${baselineY.toFixed(1)}" stroke="#2a4a34" stroke-width="1" stroke-dasharray="4,3" opacity=".8"/>`:''}
    <polygon points="${pts} ${px(hist.length-1).toFixed(1)},${H} ${P},${H}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${px(hist.length-1).toFixed(1)}" cy="${py(last).toFixed(1)}" r="3.5" fill="${col}"/>
  </svg>
  <div style="display:flex;justify-content:space-between;margin-top:5px">
    <span style="color:#3a5a42;font-size:10px">起始 ◈${fmtChips(first)}</span>
    <span style="color:${col};font-size:10px;font-weight:700">当前 ◈${fmtChips(last)} ${last>first?'▲':'▼'}</span>
  </div></div>`;
}

function getActionFeedback(a){
  const msgs=[];
  if(!a||a.equity==null)return msgs;
  const ev=a.equity/100,po=(a.potOdds||0)/100,pot=a.pot||0;
  if(a.action==='fold'){
    if(a.equity>=60){const evLoss=Math.round(pot*ev);msgs.push({level:'warn',text:`胜率 ${a.equity}%，弃牌放弃正期望约 +${fmtChips(evLoss)} 筹码`});}
    else if(a.equity>=45&&po>0&&ev>=po)msgs.push({level:'warn',text:`赔率 ${a.potOdds}% < 胜率 ${a.equity}%，赔率划算却弃牌`});
  }else if(a.action==='call'){
    if(a.equity<25&&po>0&&ev<po)msgs.push({level:'warn',text:`胜率 ${a.equity}% < 赔率 ${a.potOdds}%，跟注负期望`});
    if(a.handT>=5&&a.equity>=65)msgs.push({level:'tip',text:`${a.handName} 是强牌，加注更能榨取价值`});
  }else if(a.action==='raise'){
    if(a.equity<30)msgs.push({level:'warn',text:`胜率仅 ${a.equity}%，加注偏冒进`});
  }else if(a.action==='check'){
    if(a.handT>=5&&a.equity>=65)msgs.push({level:'tip',text:`${a.handName} 强牌，主动下注比过牌更好`});
  }
  return msgs;
}

function getStyleStats(handHistory){
  const allLogs=handHistory.flatMap(h=>h.playerLog||[]);
  const total=allLogs.length;
  if(total===0)return null;
  const byStreet=s=>allLogs.filter(a=>a.street===s);
  const folds=allLogs.filter(a=>a.action==='fold').length;
  const raises=allLogs.filter(a=>a.action==='raise').length;
  const calls=allLogs.filter(a=>a.action==='call').length;
  const checks=allLogs.filter(a=>a.action==='check').length;
  const vpipHands=handHistory.filter(h=>(h.playerLog||[]).some(a=>a.street==='pre'&&(a.action==='call'||a.action==='raise'))).length;
  const vpip=Math.round(vpipHands/handHistory.length*100);
  const af=calls+checks>0?(raises/(calls+checks)).toFixed(1):'∞';
  const foldPct=Math.round(folds/total*100);
  const raisePct=Math.round(raises/total*100);
  const preLogs=byStreet('pre');
  const pfr=preLogs.length>0?Math.round(preLogs.filter(a=>a.action==='raise').length/handHistory.length*100):0;
  const riverFolds=byStreet('river').filter(a=>a.action==='fold').length;
  const riverTotal=byStreet('river').length;
  const riverFoldPct=riverTotal>0?Math.round(riverFolds/riverTotal*100):0;
  const badFolds=allLogs.filter(a=>a.action==='fold'&&a.equity!=null&&a.equity>=50).length;
  const looseCalls=allLogs.filter(a=>a.action==='call'&&a.equity!=null&&a.equity<30&&a.potOdds>0&&a.equity<a.potOdds).length;
  const missedValue=allLogs.filter(a=>(a.action==='call'||a.action==='check')&&a.handT>=5&&a.equity>=65).length;
  return{total,folds,raises,calls,checks,vpip,af,foldPct,raisePct,pfr,riverFoldPct,riverTotal,badFolds,looseCalls,missedValue};
}

async function fetchCoaching(prompt,cacheKey){
  if(S.coachCache[cacheKey]!==undefined)return S.coachCache[cacheKey];
  S.coachCache[cacheKey]=null; // mark pending
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:150,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){S.coachCache[cacheKey]=undefined;return'';}
    const data=await res.json();
    const text=(data.content?.[0]?.text||'').trim();
    S.coachCache[cacheKey]=text||undefined;
    return text;
  }catch(e){
    // CORS / network / no API key – silently skip
    S.coachCache[cacheKey]=undefined;
    return'';
  }
}

// ═══════════════════════════════════════
// BETTING ORBIT ENGINE
// ═══════════════════════════════════════
function buildActionOrder(dealer,isPreflop,ais,pFolded){
  const seats=[];const start=isPreflop?dealer+3:dealer+1;
  for(let i=0;i<6;i++){const s=(start+i)%6;if(s===PLAYER_SEAT){if(!pFolded)seats.push(s)}else{const ai=ais[s];if(ai&&!ai.folded)seats.push(s)}}
  return seats;
}
function rebuildAfterRaise(raiserSeat,ais,pFolded){
  const seats=[];for(let i=1;i<=5;i++){const s=(raiserSeat+i)%6;if(s===PLAYER_SEAT){if(!pFolded)seats.push(s)}else{const ai=ais[s];if(ai&&!ai.folded)seats.push(s)}}
  return seats;
}

async function runOrbit(){
  const orbit=S.orbit;
  const myGen=S_GEN;
  try{
  while(orbit.toAct.length>0){
    const pFolded=orbit.pFolded;const curAis=S.ais;
    const activeTotal=(pFolded?0:1)+curAis.filter(a=>!a.folded).length;
    if(activeTotal<=1){doShowdown();return}
    const seat=orbit.toAct[0];
    if(seat===PLAYER_SEAT){
      S.curBet=orbit.curBet;S.playerBet=orbit.playerStreetBet;
      const _minR=Math.min(S.playerChips,orbit.curBet+(orbit.lastRaiseSize||BB));S.raiseAmt=Math.min(Math.max(_minR,BB*2),S.playerChips);
      S.waiting=true;renderAll();return;
    }
    orbit.toAct.shift();
    const ai=curAis[seat];if(!ai||ai.folded)continue;
    S.ais[seat]={...ai,thinking:true};renderAiRow();
    const base={gpt4:280,gemini:750,llama:180,claude:580,grok:220}[ai.id]||400;
    await new Promise(r=>setTimeout(r,base+Math.random()*500));
    if(S_GEN!==myGen){S.ais[seat]={...S.ais[seat],thinking:false};return;}
    let dec;try{dec=makeAiDecision(ai,S.comm,S.pot,orbit.curBet)}catch(e){dec={action:'call',amount:0,comment:'...',_why:'error'}}
    let up={...S.ais[seat],thinking:false};
    const streetName=S.comm.length===0?'pre':S.comm.length===3?'flop':S.comm.length===4?'turn':'river';
    const addLog=(action,why)=>[...(ai.decisionLog||[]),{street:streetName,action,why:why||''}].slice(-8);

    if(dec.action==='fold'){
      up={...up,folded:true,lastAction:'fold',comment:dec.comment,decisionLog:addLog('fold',dec._why)};
    } else if(dec.action==='raise'&&dec.amount>orbit.curBet){
      // Clamp raise to AI's available chips
      const maxTotal=ai.bet+ai.chips;
      const rt=Math.min(Math.max(+dec.amount,orbit.curBet+1),maxTotal);
      const ex=Math.min(rt-ai.bet,ai.chips); // extra chips to put in
      if(ex>0&&rt>orbit.curBet){
        orbit.lastRaiseSize=Math.max(rt-orbit.curBet,orbit.lastRaiseSize);
        orbit.curBet=rt;S.pot+=ex;
        up={...up,bet:ai.bet+ex,totalIn:(ai.totalIn||0)+ex,chips:Math.max(0,ai.chips-ex),lastAction:'raise',comment:dec.comment,decisionLog:addLog(`raise ${rt}`,dec._why)};
        S.ais[seat]=up;orbit.toAct=rebuildAfterRaise(seat,S.ais,orbit.pFolded);renderAiRow();renderTopBar();renderFelt();continue;
      } else {
        // Fall through to call/all-in
        const tc=Math.min(Math.max(0,orbit.curBet-ai.bet),ai.chips);S.pot+=tc;
        up={...up,bet:ai.bet+tc,totalIn:(ai.totalIn||0)+tc,chips:Math.max(0,ai.chips-tc),lastAction:'call',comment:dec.comment,decisionLog:addLog(tc>=ai.chips?'all-in':'call',dec._why)};
      }
    } else {
      const tc=Math.min(Math.max(0,orbit.curBet-ai.bet),ai.chips);S.pot+=tc;
      const isCheck=tc===0;
      up={...up,bet:ai.bet+tc,totalIn:(ai.totalIn||0)+tc,chips:Math.max(0,ai.chips-tc),lastAction:'call',comment:isCheck?'':dec.comment,decisionLog:addLog(isCheck?'check':tc>=ai.chips?'all-in':'call',dec._why)};
    }
    S.ais[seat]=up;renderAiRow();renderTopBar();renderFelt();
  }
  advanceStreet();
  }catch(err){
    // Safety net: log error and force showdown so game never permanently freezes
    console.error('[runOrbit error]',err);
    S.ais=S.ais.map(a=>({...a,thinking:false}));
    if(S.phase!=='showdown'&&S.phase!=='lobby'){
      try{doShowdown();}catch(e2){
        // Last resort: reset to lobby
        console.error('[doShowdown error]',e2);
        S.phase='showdown';S.result={winner:'error',amount:0,handName:'系统错误，自动结束'};
        S.pot=0;renderAll();
      }
    }
  }
}

function advanceStreet(){
  const orbit=S.orbit;const pFolded=orbit.pFolded;
  const activeTotal=(pFolded?0:1)+S.ais.filter(a=>!a.folded).length;
  if(activeTotal<=1){doShowdown();return}
  S.ais=S.ais.map(a=>({...a,bet:0}));S.playerBet=0;S.curBet=0;
  orbit.playerStreetBet=0;orbit.curBet=0;orbit.lastRaiseSize=BB;
  const cur=S.comm;
  if(cur.length===0){
    const flop=S.deck.splice(0,3);S.comm=[...flop];S.phase='flop';S.animatedComm=new Set();snd('deal');
  } else if(cur.length===3){
    S.animatedComm=new Set([0,1,2]);S.comm=[...cur,S.deck.shift()];S.phase='turn';snd('deal');
  } else if(cur.length===4){
    S.animatedComm=new Set([0,1,2,3]);S.comm=[...cur,S.deck.shift()];S.phase='river';snd('deal');
  } else {doShowdown();return}
  orbit.toAct=buildActionOrder(S.dealerPos,false,S.ais,pFolded);
  updateAnalysis();renderAll();
  runOrbit();
}

// ═══════════════════════════════════════
// START HAND
// ═══════════════════════════════════════
function startHand(){
  S_GEN++;
  const newDealer=(S.dealerPos+1)%6;S.dealerPos=newDealer;
  const sbSeat=(newDealer+1)%6,bbSeat=(newDealer+2)%6;
  const deck=shuffle(fullDeck());let idx=0;
  // Deal in proper table rotation: starting from SB (dealer+1), going clockwise
  // Each seat gets 2 cards in order. Player is PLAYER_SEAT=5, AIs are seats 0-4.
  const holeCards={}; // seat -> [card1, card2]
  for(let i=0;i<6;i++){
    const seat=(newDealer+1+i)%6;
    holeCards[seat]=[deck[idx++],deck[idx++]];
  }
  const pCards=holeCards[PLAYER_SEAT];
  const chipMap=Object.fromEntries(S.ais.map(a=>[a.id,a.chips<=0?1500:a.chips]));
  S.ais=AI_CONFIGS.map((cfg,i)=>{
    const isSB=i===sbSeat,isBB=i===bbSeat;
    const prev=chipMap[cfg.id]??cfg.chips;
    let pos=null;if(i===newDealer)pos='D';else if(isSB)pos='SB';else if(isBB)pos='BB';
    // Blind amount clamped to actual chips (prevents negative)
    const blindAmt=isSB?Math.min(SB,prev):isBB?Math.min(BB,prev):0;
    return{...cfg,chips:prev-blindAmt,bet:blindAmt,totalIn:blindAmt,cards:holeCards[i],folded:false,thinking:false,lastAction:(isSB||isBB)?'blind':null,comment:isSB?`小盲 ${blindAmt}`:isBB?`大盲 ${blindAmt}`:'',showCards:false,pos,decisionLog:[]};
  });
  let playerPos=null;
  if(PLAYER_SEAT===newDealer)playerPos='D';else if(PLAYER_SEAT===sbSeat)playerPos='SB';else if(PLAYER_SEAT===bbSeat)playerPos='BB';
  const playerIsSB=PLAYER_SEAT===sbSeat,playerIsBB=PLAYER_SEAT===bbSeat;
  if(S.playerChips<=0)S.playerChips=1500;
  const playerBlind=playerIsSB?Math.min(SB,S.playerChips):playerIsBB?Math.min(BB,S.playerChips):0;
  // Record chips before hand
  S.playerChipsAtHandStart=S.playerChips;
  S.playerWasAllin=false;
  // Survivor achievement check at start
  if(S.playerChips<100)unlockAch('survivor');
  S.deck=deck.slice(idx);S.handNum++;S.playerCards=pCards;S.comm=[];
  S.playerFolded=false;S.result=null;S.waiting=false;
  S.equity=null;S.outs=null;S.nuts=null;S.betAdvice=null;
  S.tab='analysis';S.currentPlayerPos=playerPos;S.raiseBtnLabel=null;S.aiDetail=null;S.animatedComm=new Set();S.playerCardsDealt=false;S.playerLog=[];
  // Pot = sum of all blind bets (AIs + player)
  S.pot=S.ais.reduce((sum,a)=>sum+a.bet,0)+playerBlind;
  S.playerBet=playerBlind;S.playerTotalIn=playerBlind;S.curBet=Math.max(BB,S.ais[bbSeat]?.bet??BB);
  S.playerChips=S.playerChips-playerBlind;S.phase='preflop';
  S.orbit={toAct:buildActionOrder(newDealer,true,S.ais,false),curBet:S.curBet,playerStreetBet:playerBlind,pFolded:false,lastRaiseSize:BB};
  snd('deal');updateAnalysis();renderAll();
  runOrbit();
}

function logPlayerAction(action,amount=0){
  const street=S.comm.length===0?'pre':S.comm.length===3?'flop':S.comm.length===4?'turn':'river';
  const hand=S.playerCards.length>0?evalHand([...S.playerCards,...S.comm]):null;
  const toCall=Math.max(0,S.orbit.curBet-S.orbit.playerStreetBet);
  const potOdds=toCall>0?Math.round(toCall/(S.pot+toCall)*100):0;
  S.playerLog.push({street,action,amount,handName:hand?hand.n:'?',handT:hand?hand.t:-1,equity:S.equity,potOdds,pot:S.pot,pos:S.currentPlayerPos||'?',chipsBefore:S.playerChips+(action==='fold'?0:amount)});
}

// ═══════════════════════════════════════
// PLAYER ACTIONS
// ═══════════════════════════════════════
async function onFold(){
  if(!S.waiting||S.playerFolded)return;
  logPlayerAction('fold',0);
  S.waiting=false;S.playerFolded=true;S.orbit.pFolded=true;
  S.orbit.toAct=S.orbit.toAct.filter(s=>s!==PLAYER_SEAT);
  renderAll();
  const stillActive=S.ais.filter(a=>!a.folded).length;
  if(stillActive<=1){doShowdown();return}
  if(S.orbit.toAct.length===0){advanceStreet();return}
  await runOrbit();
}
async function onCall(){
  if(!S.waiting||S.playerFolded)return;
  const _tcLog=Math.min(Math.max(0,S.orbit.curBet-S.orbit.playerStreetBet),S.playerChips);
  logPlayerAction(_tcLog===0?'check':'call',_tcLog);
  S.waiting=false;
  const orbit=S.orbit;const tc=Math.min(Math.max(0,orbit.curBet-orbit.playerStreetBet),S.playerChips);
  orbit.playerStreetBet+=tc;S.playerBet=orbit.playerStreetBet;S.playerChips-=tc;S.pot+=tc;
  S.playerTotalIn=(S.playerTotalIn||0)+tc;
  if(S.playerChips<=0)S.playerWasAllin=true;
  orbit.toAct=orbit.toAct.filter(s=>s!==PLAYER_SEAT);
  renderAll();await runOrbit();
}
async function onRaise(){
  if(!S.waiting||S.playerFolded)return;
  const orbit=S.orbit;const total=Math.min(S.raiseAmt,S.playerChips);
  if(total<=orbit.curBet)return;
  logPlayerAction('raise',total);
  S.waiting=false;
  const extra=total-orbit.playerStreetBet;S.playerChips-=extra;
  S.playerTotalIn=(S.playerTotalIn||0)+extra;
  if(S.playerChips<=0)S.playerWasAllin=true;
  orbit.lastRaiseSize=Math.max(total-orbit.curBet,orbit.lastRaiseSize);
  orbit.playerStreetBet=total;S.playerBet=total;orbit.curBet=total;S.curBet=total;S.pot+=extra;
  orbit.toAct=rebuildAfterRaise(PLAYER_SEAT,S.ais,orbit.pFolded);
  renderAll();await runOrbit();
}

// ═══════════════════════════════════════
// SHOWDOWN & ACHIEVEMENT CHECKS
// ═══════════════════════════════════════
function checkAchievements(playerWon,fp,pFolded,allActive,finalHand){
  if(!playerWon)return;
  // first_win
  if(S.stats.totalWins===1)unlockAch('first_win');
  // royal flush
  if(finalHand&&finalHand.r===9900)unlockAch('royal_flush');
  // all_in_win
  if(S.playerWasAllin)unlockAch('all_in_win');
  // comeback
  if(S.playerChipsAtHandStart<500)unlockAch('comeback');
  // ten_wins
  if(S.stats.totalWins>=10)unlockAch('ten_wins');
  // bluff_win: everyone else folded
  if(allActive.length===1&&!pFolded)unlockAch('bluff_win');
  // big_pot
  if(fp>=1000)unlockAch('big_pot');
  // streak3
  if(S.stats.winStreak>=3)unlockAch('streak3');
  // streak5
  if(S.stats.winStreak>=5)unlockAch('streak5');
}

function doShowdown(){
  const pFolded=S.orbit.pFolded;
  S.phase='showdown';S.waiting=false;
  S.ais=S.ais.map(a=>({...a,showCards:!a.folded}));
  const fp=S.pot;

  // ALL contestants (including folded - needed for side pot cap)
  // totalIn = total chips contributed this hand
  const allContestants=[
    {id:'player',name:'你',score:!pFolded?evalHand([...S.playerCards,...S.comm]):{r:-1},
      cards:S.playerCards,totalIn:S.playerTotalIn||0,folded:pFolded},
    ...S.ais.map(a=>({id:a.id,name:a.name,color:a.color,
      score:!a.folded?evalHand([...a.cards,...S.comm]):{r:-1},
      cards:a.cards,totalIn:a.totalIn||0,folded:a.folded}))
  ];
  const active=allContestants.filter(p=>!p.folded);

  let winner=null;let playerWon=false;let playerWinAmt=0;

  // ── Side-pot aware distribution ──────────────────────
  // Sort all by totalIn ascending to process side pots from smallest
  function distributePots(contestants, allPlayers){
    // Safe side-pot distribution
    // Work on copies so we don't mutate originals
    const pool=[...allPlayers].map(p=>({...p}));
    const resolved={};
    contestants.forEach(p=>{resolved[p.id]=0});
    allPlayers.forEach(p=>{if(!(p.id in resolved))resolved[p.id]=0});

    let safety=0;
    while(safety++<20){
      // Any chips left to distribute?
      const totalLeft=pool.reduce((s,p)=>s+p.totalIn,0);
      if(totalLeft<=0)break;

      // Cap = smallest totalIn among anyone still in pool
      const cap=Math.min(...pool.filter(p=>p.totalIn>0).map(p=>p.totalIn));
      if(!isFinite(cap)||cap<=0)break;

      // Build pot: each player contributes up to cap
      let potSize=0;
      pool.forEach(p=>{
        const take=Math.min(p.totalIn,cap);
        potSize+=take;
        p.totalIn=Math.max(0,p.totalIn-take);
      });
      if(potSize<=0)break;

      // Active (non-folded) contestants eligible for this pot
      const eligible=contestants.filter(p=>!p.folded);
      if(eligible.length===0){
        // Edge case: nobody to give it to - split among all contestants
        const share=Math.floor(potSize/contestants.length)||0;
        contestants.forEach(p=>{resolved[p.id]=(resolved[p.id]||0)+share;});
      } else {
        eligible.sort((a,b)=>b.score.r-a.score.r);
        const best=eligible[0].score.r;
        const pwinners=eligible.filter(e=>e.score.r===best);
        const share=Math.floor(potSize/pwinners.length);
        const rem=potSize-share*pwinners.length;
        pwinners.forEach((w,i)=>{resolved[w.id]=(resolved[w.id]||0)+share+(i===0?rem:0);});
      }
    }
    return resolved;
  }

  let resultName='',resultWinner=null;
  if(active.length===0){S.pot=0;}
  else if(active.length===1){
    const w=active[0];
    const amt=fp;
    if(w.id==='player'){S.playerChips+=amt;playerWon=true;playerWinAmt=amt;
      S.result={winner:'player',amount:amt,handName:'对手全部弃牌'};}
    else{S.ais=S.ais.map(a=>a.id===w.id?{...a,chips:Math.max(0,a.chips)+amt}:a);
      S.result={winner:w.name,color:w.color,amount:amt,handName:'对手弃牌'};}
    winner=w.id==='player'?'player':w.id;
  } else {
    const dist=distributePots(active,allContestants);
    // Apply winnings
    let pShare=0;
    allContestants.forEach(p=>{
      const gain=dist[p.id]||0;
      if(gain<=0)return;
      if(p.id==='player'){S.playerChips+=gain;playerWon=true;playerWinAmt+=gain;pShare+=gain;}
      else{S.ais=S.ais.map(a=>a.id===p.id?{...a,chips:Math.max(0,a.chips)+gain}:a);}
    });
    // Determine result display: find highest scorer among active
    active.sort((a,b)=>b.score.r-a.score.r);
    resultName=active[0].score.n;
    const topScore=active[0].score.r;
    const topWinners=active.filter(a=>a.score.r===topScore);
    if(topWinners.length>1){
      const names=topWinners.map(w=>w.id==='player'?'你':w.name).join(' & ');
      resultName=`平分底池 ${names} · ${resultName}`;
    }
    resultWinner=topWinners[0];
    if(playerWon){
      S.result={winner:'player',amount:pShare,handName:resultName};
    } else {
      S.result={winner:resultWinner.name,color:resultWinner.color,amount:dist[resultWinner.id]||0,handName:resultName};
    }
    winner=playerWon?'player':resultWinner.id;
  }
  S.pot=0;
  const fp2=playerWinAmt||0; // for stats tracking

  // Update stats
  const finalHand=S.playerCards.length>0&&S.comm.length>0?evalHand([...S.playerCards,...S.comm]):null;
  if(playerWon){
    S.stats.totalWins++;S.stats.winStreak++;S.stats.bestStreak=Math.max(S.stats.bestStreak,S.stats.winStreak);
    S.stats.totalChipsWon+=fp2;
    snd('win');
  } else {
    S.stats.totalLosses++;S.stats.winStreak=0;
    snd('lose');
  }
  // Track chip history + persist current chips
  S.stats.chipHistory.push(S.playerChips);
  if(S.stats.chipHistory.length>60)S.stats.chipHistory=S.stats.chipHistory.slice(-60);
  S.stats.lastChips=S.playerChips; // persist for next session
  // Check achievements
  checkAchievements(playerWon,fp,pFolded,active,finalHand);
  saveStats(); // async but fire-and-forget is fine here

  S.handHistory=[{handNum:S.handNum,comm:[...S.comm],ais:S.ais.map(a=>({id:a.id,name:a.name,emoji:a.emoji,color:a.color,cards:a.cards,folded:a.folded,chips:a.chips,decisionLog:a.decisionLog||[]})),playerCards:[...S.playerCards],playerLog:[...S.playerLog],finalHand,winner,pot:fp},...S.handHistory].slice(0,20);
  // Ensure no AI has negative chips after showdown
  S.ais=S.ais.map(a=>({...a,chips:Math.max(0,a.chips)}));
  renderAll();
}

// ═══════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════
function updateAnalysis(){
  if(S.playerCards.length<2)return;
  const activeCount=S.ais.filter(a=>!a.folded).length;
  // Equity: only uses player cards + community cards, NO AI hole cards (fair simulation)
  S.equity=calcEquity(S.playerCards,S.comm,activeCount||1,600);
  if(S.comm.length>=3){
    // Outs/Nuts: also no AI cards - player can't see opponents' hands
    S.outs=calcOuts(S.playerCards,S.comm);
    S.nuts=calcNuts(S.comm);
    const hi=evalHand([...S.playerCards,...S.comm]);
    const toCall=Math.max(0,S.orbit.curBet-S.orbit.playerStreetBet);
    S.betAdvice=getBetAdvice(S.equity,S.outs,hi.t,toCall,S.pot,S.playerChips);
  } else {S.outs=null;S.nuts=null;S.betAdvice=null}
}

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════
function toggleCoach(){S.showCoach=!S.showCoach;renderTopBar();renderCoach()}
function toggleSound(){S.soundOn=!S.soundOn;renderTopBar();if(S.soundOn)snd('click');}
function setTab(t){S.tab=t;renderCoach()}
function showAiDetail(i){S.aiDetail=S.ais[i];renderAiModal()}
function closeAiDetail(){S.aiDetail=null;renderAiModal()}
function setQuickRaise(label,val){S.raiseBtnLabel=label;S.raiseAmt=val;renderActionBar()}
function setRaiseAmt(v){const n=parseInt(v,10);if(!isNaN(n)){S.raiseBtnLabel=null;S.raiseAmt=Math.min(Math.max(n,0),S.playerChips);renderActionBar()}}
function adjRaise(dir){
  S.raiseBtnLabel=null;
  const minRaise=Math.min(S.playerChips,Math.max(S.orbit.curBet+(S.orbit.lastRaiseSize||BB),BB*2));
  if(dir<0)S.raiseAmt=Math.max(minRaise,Math.round((S.raiseAmt-BB)/5)*5);
  else S.raiseAmt=Math.min(Math.round((S.raiseAmt+BB)/5)*5,S.playerChips);
  renderActionBar();
}

// ═══════════════════════════════════════
// NEW: KEYBOARD SHORTCUTS
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  // Don't intercept when typing in input
  if(e.target&&e.target.tagName==='INPUT')return;
  // Lobby: start game
  if(S.phase==='lobby'&&(e.code==='Space'||e.code==='Enter')){e.preventDefault();startHand();return;}
  // Next hand
  if((S.phase==='showdown'||S.result)&&(e.code==='Space'||e.code==='Enter')){e.preventDefault();startHand();return;}
  // Action shortcuts
  if(!S.waiting||S.playerFolded||S.phase==='showdown')return;
  switch(e.code){
    case'KeyF':case'Escape':snd('fold');onFold();break;
    case'Space':case'Enter':e.preventDefault();snd('click');onCall();break;
    case'KeyR':if(S.raiseAmt>S.orbit.curBet&&S.raiseAmt<=S.playerChips){snd('raise');onRaise();}break;
    case'ArrowUp':case'Equal':e.preventDefault();adjRaise(1);break;
    case'ArrowDown':case'Minus':e.preventDefault();adjRaise(-1);break;
  }
});

// ═══════════════════════════════════════
// INIT (async to load saved stats first)
// ═══════════════════════════════════════
async function init(){
  // Show a loading state while we fetch saved data
  document.getElementById('lobby-msg').innerHTML=`
    <div style="font-size:28px;margin-bottom:8px">🃏</div>
    <div style="color:#2A4030;font-size:12px;margin-bottom:6px">读取存档中…</div>
    <div style="display:flex;gap:4px;justify-content:center">
      ${[0,1,2].map(k=>`<div style="width:5px;height:5px;border-radius:50%;background:#2A4030;animation:blink .8s ${k*.22}s infinite"></div>`).join('')}
    </div>`;

  // Load stats from whichever storage is available
  S.stats = await loadStats();

  // Restore player chips from last session if available
  if(S.stats.lastChips && S.stats.lastChips > 0){
    S.playerChips = S.stats.lastChips;
  }

  // Reset lobby message
  document.getElementById('lobby-msg').innerHTML=`
    <div style="font-size:28px;margin-bottom:6px">🃏</div>
    <div style="color:#2A4A34;font-size:12px">6人桌 · 与五大 AI 同台竞技</div>`;

  renderAll();
}
init();
</script>
