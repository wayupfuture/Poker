function makeAiDecision(ai, comm, pot, curBet) {
  const p = PERSONAS[ai.id];
  if (!p) return { action:'call', amount:0, comment:'', _why:'persona未找到' };

  const toCall = Math.max(0, curBet - ai.bet);
  const hand   = evalHand([...ai.cards, ...comm]);
  const t      = hand.t;
  const R      = () => Math.random();
  const phase  = comm.length===0?'pre':comm.length===3?'flop':comm.length===4?'turn':'river';
  const streetIdx = {pre:0,flop:1,turn:2,river:3}[phase];
  const spr    = ai.chips / Math.max(pot,1);

  // Position: 0=GPT4/UTG … 4=Grok/BTN; late position more aggressive
  const seat      = ['gpt4','gemini','llama','claude','grok'].indexOf(ai.id);
  const posBoost  = (seat / 4) * p.positionAdj;
  const effAgg    = Math.min(0.97, p.aggression * (p.streetAgg[streetIdx] ?? 1.0) + posBoost);

  // Tilt: short stack + tiltable = play wilder
  const tilted    = p.tiltable && ai.chips < 800;
  const tiltMult  = tilted ? 1.35 : 1.0;

  const isShort   = spr < 4;
  const potOdds   = toCall > 0 ? toCall / (pot + toCall) : 0;
  const potOddsPct = Math.round(potOdds * 100);
  const why = (r) => `[${hand.n}·T${t}] ${phase}·位置${seat}·SPR${spr.toFixed(1)}·${toCall?'需跟'+toCall:'无注'}｜${r}`;

  // PRE-FLOP
  if (phase === 'pre') {
    if (toCall > 0 && toCall >= curBet * 0.5) {
      if (t >= 1 || R() < p.preflopCont * tiltMult) {
        if (t >= 3 || R() < p.threeBetFreq * tiltMult)
          return mkRaise(p, pot, curBet, ai.chips, t>=2?'strong':'bluff', t, phase,
            why(`3-bet·频率${Math.round(p.threeBetFreq*100)}%`));
        return mkCall(toCall, p, 'call', why('跟注入池'));
      }
      return mkFold(p, 'fold', why(`翻前弃牌·开牌范围${Math.round(p.preflopCont*100)}%`));
    }
    if (t >= 2 || R() < p.preflopCont * tiltMult) {
      if (R() < effAgg * 0.88 + posBoost)
        return mkRaise(p, pot, curBet, ai.chips, t>=1?'strong':'bluff', t, phase,
          why(`开局加注·effAgg=${effAgg.toFixed(2)}`));
      return mkCall(toCall||0, p, 'call', why('跟注入池'));
    }
    return mkFold(p, 'fold', why('翻前弃牌'));
  }

  // POST-FLOP: Short stack jam/fold
  if (isShort) {
    if (t >= 2 || (tilted && R() < 0.6))
      return mkRaise(p, pot, curBet, ai.chips, t>=2?'strong':'bluff', t, phase,
        why(`短筹码All-in·SPR=${spr.toFixed(1)}`));
    if (potOdds < 0.30) return mkCall(toCall, p, 'call', why('短筹码·赔率尚可'));
    return mkFold(p, 'fold', why('短筹码·赔率不足'));
  }

  // Monster (boat+)
  if (t >= 6) {
    if (R() < p.slowPlay) {
      if (toCall === 0) return mkCheck(p, why('怪兽慢打·等入坑'));
      return mkCall(toCall, p, 'strong', why('怪兽慢跟·伪装弱'));
    }
    return mkRaise(p, pot, curBet, ai.chips, 'strong', t, phase, why('怪兽快打·拒绝权益'), 1.25);
  }

  // Flush / Straight
  if (t >= 4) {
    if (toCall === 0) {
      if (R() < effAgg * 0.82)
        return mkRaise(p, pot, curBet, ai.chips, 'strong', t, phase, why('顺/同花·价值'));
      return mkCheck(p, why('顺/同花·诱骗过牌'));
    }
    if (R() < effAgg * 0.52)
      return mkRaise(p, pot, curBet, ai.chips, 'reraise', t, phase, why('顺/同花·反加注'));
    return mkCall(toCall, p, 'call', why('顺/同花·跟注'));
  }

  // Set / Trips — check-raise trap
  if (t === 3) {
    if (toCall === 0) {
      if (R() < p.slowPlay * 0.9) return mkCheck(p, why('三条·check-raise陷阱'));
      return mkRaise(p, pot, curBet, ai.chips, 'strong', t, phase, why('三条·主动下注'));
    }
    if (R() < effAgg * 0.75 + 0.2)
      return mkRaise(p, pot, curBet, ai.chips, 'reraise', t, phase, why('三条check-raise！'));
    return mkCall(toCall, p, 'call', why('三条·慢跟'));
  }

  // Two pair
  if (t === 2) {
    if (toCall === 0) {
      if (R() < effAgg * 0.72)
        return mkRaise(p, pot, curBet, ai.chips, 'strong', t, phase, why('两对·下注'));
      return mkCheck(p, why('两对·过牌诱骗'));
    }
    if (R() < effAgg * 0.48 && phase !== 'pre')
      return mkRaise(p, pot, curBet, ai.chips, 'reraise', t, phase, why('两对·反加注'));
    if (potOdds < 0.38 || R() > p.panicFold)
      return mkCall(toCall, p, 'call', why(`两对·跟注·赔率${potOddsPct}%`));
    return mkFold(p, 'fold', why('两对·面对大注弃牌'));
  }

  // One pair
  if (t === 1) {
    if (toCall === 0) {
      if (R() < p.donkFreq * tiltMult)
        return mkRaise(p, pot, curBet, ai.chips, 'strong', t, phase,
          why(`一对·donk下注·${Math.round(p.donkFreq*100)}%`));
      if (R() < effAgg * 0.36)
        return mkRaise(p, pot, curBet, ai.chips, 'strong', t, phase, why('一对·试探'));
      return mkCheck(p, why('一对·过牌观望'));
    }
    if (seat >= 3 && spr > 8 && R() < 0.38)
      return mkCall(toCall, p, 'call', why('一对·位置浮注'));
    const ratio = toCall / Math.max(pot, 1);
    if (ratio < 0.22 || R() > p.panicFold + 0.08)
      return mkCall(toCall, p, 'call', why(`一对·跟注·比率${Math.round(ratio*100)}%`));
    return mkFold(p, 'fold', why('一对·面对大注弃牌'));
  }

  // High card
  if (toCall === 0) {
    const cbetThr = p.cBetFreq * tiltMult * (phase==='flop'?1.0:phase==='turn'?0.6:0.4);
    if (R() < cbetThr)
      return mkRaise(p, pot, curBet, ai.chips, 'bluff', t, phase,
        why(`c-bet·${phase}·${Math.round(p.cBetFreq*100)}%`));
    if (R() < p.donkFreq * tiltMult)
      return mkRaise(p, pot, curBet, ai.chips, 'bluff', t, phase, why('高牌·donk蒙'));
    return mkCheck(p, why('高牌·过牌放弃'));
  }

  if (toCall >= curBet * 0.65 && R() < p.foldTo3bet)
    return mkFold(p, 'fold', why(`高牌·面对大注弃牌·${Math.round(p.foldTo3bet*100)}%`));
  if (phase === 'river' && R() < p.bluffFreq * 0.50 * tiltMult)
    return mkRaise(p, pot, curBet, ai.chips, 'bluff', t, phase, why('河牌极化蒙加注'));
  if (tilted && R() < 0.50)
    return mkCall(toCall, p, 'call', why('倾斜·不理性跟注'));
  const ratio = toCall / Math.max(pot,1);
  if (ratio < 0.14 && R() < 0.58) return mkCall(toCall, p, 'call', why('高牌·跟小注'));
  if (R() < p.panicFold + 0.15) return mkFold(p, 'fold', why('高牌·弃牌'));
  return mkCall(toCall, p, 'call', why('高牌·被动跟注'));
}

// ── Decision builders ─────────────────────────────────────────────────────
function pickLine(p, key) {
  const arr = p.lines[key] || p.lines.call;
  return arr[Math.floor(Math.random() * arr.length)];
}
function sizeBet(p, pot, curBet, chips, handT=0, street='flop', overrideMult=1.0) {
  const mults = p.betSizing;
  const m = mults[Math.floor(Math.random() * mults.length)];
  const streetMult   = {pre:0.9, flop:1.0, turn:1.18, river:1.35}[street] || 1.0;
  const strengthMult = 0.75 + (handT / 9) * 0.70;
  const spr          = chips / Math.max(pot, 1);
  const sprMult      = spr < 3 ? 1.4 : spr < 6 ? 1.15 : spr < 12 ? 1.0 : 0.88;
  const variance     = 0.84 + Math.random() * 0.30;
  const raw = Math.round((pot * m * streetMult * strengthMult * sprMult * overrideMult * variance) / 5) * 5;
  return Math.min(Math.max(raw, curBet + 20), chips);
}
function mkRaise(p, pot, curBet, chips, lineKey, handT=0, street='flop', why='', overrideMult=1.0) {
  const amt = sizeBet(p, pot, curBet, chips, handT, street, overrideMult);
  return { action:'raise', amount:amt, comment:pickLine(p, lineKey), _why:why||`价值加注·T${handT}·${street}` };
}
function mkCall(toCall, p, lineKey, why='') {
  return { action:'call', amount:toCall, comment:pickLine(p, lineKey), _why:why||'跟注' };
}
function mkFold(p, lineKey, why='') {
  return { action:'fold', comment:pickLine(p, lineKey), _why:why||'弃牌' };
}
function mkCheck(p, why='') {
  return { action:'call', amount:0, comment:pickLine(p, 'check'), _why:why||'过牌' };
}

// ══════════════════════════════════════════
// DECK / HAND UTILS
// ══════════════════════════════════════════
const fullDeck = () => SUITS.flatMap(s => VALUES.map(v => ({suit:s,value:v})));
const cardKey  = c => c.value + c.suit;
const _rndInt = (n) => {
  try { const b=new Uint32Array(1); crypto.getRandomValues(b); return b[0]%n; } catch(_){}
  return Math.floor(Math.random()*n);
};
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j=_rndInt(i+1); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
};
const deckExcluding = (...groups) => { const used=new Set(groups.flat().map(cardKey)); return fullDeck().filter(c=>!used.has(cardKey(c))); };

function combos(arr,k){
  if(k===0)return[[]]; if(arr.length<k)return[];
  const[h,...t]=arr;
  return [...combos(t,k-1).map(c=>[h,...c]),...combos(t,k)];
}
function score5(cards){
  const vals=cards.map(c=>VAL_NUM[c.value]).sort((a,b)=>b-a);
  const vc={}; vals.forEach(v=>vc[v]=(vc[v]||0)+1);
  const counts=Object.values(vc).sort((a,b)=>b-a);
  const flush=new Set(cards.map(c=>c.suit)).size===1;
  const uv=[...new Set(vals)].sort((a,b)=>b-a);
  const str=uv.length===5&&uv[0]-uv[4]===4;
  const wheel=JSON.stringify(uv)==='[14,5,4,3,2]';
  if(flush&&str&&vals[0]===14)return{r:9900,n:'同花大顺',t:9};
  if(flush&&(str||wheel))return{r:8000+(wheel?5:vals[0]),n:'同花顺',t:8};
  if(counts[0]===4){const q=+Object.keys(vc).find(k=>vc[k]===4);return{r:7000+q,n:'四条',t:7};}
  if(counts[0]===3&&counts[1]===2){const q=+Object.keys(vc).find(k=>vc[k]===3);return{r:6000+q,n:'葫芦',t:6};}
  if(flush)return{r:5000+vals[0],n:'同花',t:5};
  if(str||wheel)return{r:4000+(wheel?5:vals[0]),n:'顺子',t:4};
  if(counts[0]===3){const q=+Object.keys(vc).find(k=>vc[k]===3);return{r:3000+q,n:'三条',t:3};}
  if(counts[0]===2&&counts[1]===2){const ps=Object.keys(vc).filter(k=>vc[k]===2).map(Number).sort((a,b)=>b-a);return{r:2000+ps[0]*15+ps[1],n:'两对',t:2};}
  if(counts[0]===2){const p=+Object.keys(vc).find(k=>vc[k]===2);return{r:1000+p,n:'一对',t:1};}
  return{r:vals[0],n:'高牌',t:0};
}
function evalHand(cards){
  if(cards.length<2)return{r:0,n:'无牌',t:-1};
  if(cards.length<5){
    const vals=cards.map(c=>VAL_NUM[c.value]).sort((a,b)=>b-a);
    const vc={}; vals.forEach(v=>vc[v]=(vc[v]||0)+1);
    if(Object.values(vc).includes(2)){const p=+Object.keys(vc).find(k=>vc[k]===2);return{r:1000+p,n:'一对',t:1};}
    return{r:vals[0],n:'高牌',t:0};
  }
  return combos(cards,5).reduce((b,c)=>{const s=score5(c);return s.r>b.r?s:b},{r:-1,n:'无牌',t:-1});
}

// ══════════════════════════════════════════
// ANALYSIS
// ══════════════════════════════════════════
function calcEquity(myCards, comm, opponents=2, N=600){
  if(myCards.length<2)return 50;
  const rem=deckExcluding(myCards,comm);
  let wins=0,ties=0;
  for(let i=0;i<N;i++){
    const sh=shuffle(rem); let idx=0;
    const opp=Array.from({length:opponents},()=>[sh[idx++],sh[idx++]]);
    const board=[...comm]; while(board.length<5)board.push(sh[idx++]);
    if(board.length!==5)continue;
    const my=evalHand([...myCards,...board]).r;
    const mx=Math.max(...opp.map(h=>evalHand([...h,...board]).r));
    if(my>mx)wins++; else if(my===mx)ties+=0.5;
  }
  return Math.round((wins+ties)/N*100);
}

function calcOuts(myCards, comm){
  if(comm.length<3)return null;
  const rem=deckExcluding(myCards,comm);
  const cur=evalHand([...myCards,...comm]);
  const outCards=rem.filter(c=>evalHand([...myCards,...comm,c]).r>cur.r);
  const groups={};
  outCards.forEach(c=>{ const imp=evalHand([...myCards,...comm,c]); groups[imp.n]=(groups[imp.n]||0)+1; });
  const streetsLeft=comm.length===3?2:1;
  return{ count:outCards.length, prob:Math.min(outCards.length*(streetsLeft===2?4:2),98), groups, streetsLeft };
}

function calcNuts(comm){
  if(comm.length<3)return null;
  const rem=deckExcluding(comm);
  let best={r:-1,n:'无',t:-1,hand:[]};
  for(const pair of combos(rem,2)){
    const s=evalHand([...pair,...comm]);
    if(s.r>best.r)best={...s,hand:pair};
  }
  return best;
}

// ── Betting advice (local, no AI needed) ──
function getBetAdvice(equity, outs, handT, toCall, pot, playerChips, comm){
  const potOddsPct = toCall>0 ? Math.round(toCall/(pot+toCall)*100) : 0;
  const hasOuts = outs && outs.count>0;
  const phase = comm.length===0?'preflop':comm.length===3?'flop':comm.length===4?'turn':'river';

  if(handT>=6){ // 葫芦以上
    return { action:'raise', label:'强力加注', color:'#FFD700',
      amount: Math.min(Math.round(pot*0.75), playerChips),
      reason:`你持有${['','高牌','一对','两对','三条','顺子','同花','葫芦','四条','同花顺','同花大顺'][handT+1]||'强牌'}，价值下注榨取筹码！` };
  }
  if(handT>=4){
    return { action:'raise', label:'适度加注', color:'#44CC77',
      amount: Math.min(Math.round(pot*0.5), playerChips),
      reason:'中强牌，主动加注建立优势，试探对手实力。' };
  }
  if(equity>=60){
    return { action:'raise', label:'价值下注', color:'#44CC77',
      amount: Math.min(Math.round(pot*0.4), playerChips),
      reason:`胜率 ${equity}%，有优势，可以加注让对手付钱。` };
  }
  if(toCall===0){
    if(hasOuts && outs.prob>=20){
      return { action:'check', label:'免费看牌', color:'#4A9EFF',
        amount:0, reason:`有 ${outs.count} 张 outs (${outs.prob}% 改善)，免费过牌等待机会。` };
    }
    return { action:'check', label:'过牌观望', color:'#4A9EFF',
      amount:0, reason:'手牌一般，免费过牌是最安全的选择。' };
  }
  if(equity>=potOddsPct+5 && hasOuts){
    return { action:'call', label:'值得跟注', color:'#4A9EFF',
      amount:toCall, reason:`胜率(${equity}%)高于底池赔率(${potOddsPct}%)，且有 ${outs.count} 张改善牌。` };
  }
  if(equity>=50){
    return { action:'call', label:'跟注可行', color:'#88AAFF',
      amount:toCall, reason:`胜率约 ${equity}%，均势局面，适合跟注看后续牌。` };
  }
  if(hasOuts && outs.prob>=15 && equity>=potOddsPct-5){
    return { action:'call', label:'听牌跟注', color:'#FF8C42',
      amount:toCall, reason:`听牌中，${outs.count} 张 outs，改善率约 ${outs.prob}%，赌一把。` };
  }
  return { action:'fold', label:'建议弃牌', color:'#FF6655',
    amount:0, reason:`胜率仅 ${equity}%，底池赔率不划算，等下一把更好的机会。` };
}

// API
// ══════════════════════════════════════════
async function callClaude(system, user, maxTokens=200){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens,
      system, messages:[{role:"user",content:user}] })
  });
  const d = await res.json();
  return d.content?.map(b=>b.text||'').join('').trim().replace(/```[a-z]*\n?|```/g,'').trim();
}

// Primary decision: instant local personality engine (no API latency)
function getAiMove(ai, comm, pot, curBet) {
  return makeAiDecision(ai, comm, pot, curBet);
}

async function getCoachAnalysis(myCards, comm, equity, outsInfo, nutsInfo, pot, curBet, playerBet, playerChips){
  const toCall = Math.max(0, curBet-playerBet);
  const hand = evalHand([...myCards,...comm]);
  const potOdds = toCall>0 ? Math.round(toCall/(pot+toCall)*100) : 0;
  try {
    const raw = await callClaude(
      "你是德扑教练，给新手用简单中文讲解。只输出JSON，不要代码块，不要其他文字。",
      `分析局势：底牌:${myCards.map(c=>c.value+c.suit).join(' ')} 公共:${comm.map(c=>c.value+c.suit).join(' ')||'无'}\n当前牌型:${hand.n} 胜率:${equity}% Outs:${outsInfo?.count||0}张(${outsInfo?.prob||0}%) Nuts:${nutsInfo?.n||'未知'} 底池:${pot} 需跟注:${toCall} 底池赔率:${potOdds}%\n返回JSON(每项25字以内): {"handExplain":"牌型好坏分析","outsExplain":"outs含义","nutsExplain":"与最强差距"}`,
      350
    );
    return JSON.parse(raw);
  } catch {
    return {
      handExplain: `当前 ${hand.n}，${hand.t>=3?'不错的手牌':'还需要改善'}。`,
      outsExplain: outsInfo?.count>0 ? `有 ${outsInfo.count} 张牌能帮你提升，约 ${outsInfo.prob}% 概率。` : '目前没有明显改善机会。',
      nutsExplain: nutsInfo ? `桌面最强牌型是${nutsInfo.n}。` : '公共牌待发。'
    };
  }
}

                {(h.ais||[]).filter(a=>(a.decisionLog||[]).length>0).map(a=>(
                  <div key={a.id} style={{borderTop:'1px solid #0a180b',paddingTop:5,marginTop:5}}>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}>

                      <span style={{color:a.color,fontSize:10,fontWeight:700}}>{a.name}</span>
                      {a.folded && <span style={{color:'#FF5544',fontSize:9}}>弃牌</span>}
                    </div>
                    {(a.decisionLog||[]).map((d,di)=>(
                      <div key={di} style={{display:'flex',gap:5,fontSize:9,lineHeight:1.6,marginBottom:2,paddingLeft:4}}>
                        <span style={{
                          color:d.action.startsWith('raise')?'#FFD700':d.action==='fold'?'#FF5544':d.action==='check'?'#7a9a84':'#44CC77',
                          fontWeight:700,flexShrink:0
                        }}>{{pre:'翻前',flop:'翻牌',turn:'转牌',river:'河牌'}[d.street]||d.street}</span>
                        <span style={{color:'#5a7a64'}}>{(d.why||d.action).slice(0,80)}</span>
                      </div>
                    ))}

}

// ══════════════════════════════════════════
// MAIN
// ══════════════════════════════════════════
function PokerApp() {
  // ── UI State ──
  const [phase, setPhase]               = useState('lobby');
  const [playerCards, setPlayerCards]   = useState([]);
  const [comm, setComm]                 = useState([]);
  const [pot, setPot]                   = useState(0);
  const [curBet, setCurBet]             = useState(0);   // highest bet this street
  const [playerBet, setPlayerBet]       = useState(0);   // player's contribution this street
  const [playerChips, setPlayerChips]   = useState(2000);
  const [playerFolded, setPlayerFolded] = useState(false);
  const [ais, setAis]                   = useState(AI_CONFIGS.map(a=>({...a,cards:[],bet:0,folded:false,thinking:false,lastAction:null,comment:'',showCards:false,pos:null})));
  const [result, setResult]             = useState(null);
  const [waiting, setWaiting]           = useState(false);
  const [handNum, setHandNum]           = useState(0);
  const [raiseAmt, setRaiseAmt]         = useState(60);
  const [raiseBtnLabel, setRaiseBtnLabel] = useState(null); // tracks which quick-btn is active
  const [tab, setTab]                   = useState('analysis');
  const [equity, setEquity]             = useState(null);
  const [outs, setOuts]                 = useState(null);
  const [nuts, setNuts]                 = useState(null);
  const [coach, setCoach]               = useState(null);
  const [coachLoading, setCoachLoading] = useState(false);
  const [betAdvice, setBetAdvice]       = useState(null);
  const [dealerPos, setDealerPos]       = useState(0);
  const [currentPlayerPos, setCurrentPlayerPos] = useState(null);
  const [showCoach, setShowCoach]               = useState(true);
  const [aiDetail, setAiDetail]                 = useState(null);
  const [handHistory, setHandHistory]           = useState([]); // [{hand, result, streets}]

  // ── Refs (always current values, safe in async) ──
  const deckRef       = useRef([]);
  const potRef        = useRef(0);
  const commRef       = useRef([]);
  const aisRef        = useRef(ais);
  const dealerPosRef  = useRef(0);
  // orbitRef tracks the live betting-round state
  // toAct: array of seat indices still to act (0-4=AIs, 5=player)
  // curBet: highest bet placed this street
  // playerStreetBet: how much player has put in this street
  // pFolded: whether the player has folded
  const orbitRef = useRef({ toAct:[], curBet:0, playerStreetBet:0, pFolded:false });

  const PLAYER_SEAT = 5;
  const SB = 10, BB = 20;

  useEffect(()=>{ aisRef.current = ais; }, [ais]);

  const activeAiCount = ais.filter(a=>!a.folded).length;

  // ── Analysis: recalc whenever cards change ──
  useEffect(()=>{
    if(playerCards.length<2) return;
    const eq = calcEquity(playerCards, comm, activeAiCount||1);
    setEquity(eq);
    if(comm.length>=3){
      const o = calcOuts(playerCards, comm);
      const n = calcNuts(comm);
      setOuts(o); setNuts(n);
      const hi = evalHand([...playerCards,...comm]);
      const ba = getBetAdvice(eq, o, hi.t, Math.max(0, orbitRef.current.curBet - orbitRef.current.playerStreetBet), potRef.current, playerChips, comm);
      setBetAdvice(ba);
    } else {
      setOuts(null); setNuts(null); setBetAdvice(null);
    }
  }, [playerCards, comm, curBet]);

  // ── Coach: fetch AI analysis on each new street ──
  useEffect(()=>{
    if(['lobby','showdown','preflop'].includes(phase) || playerCards.length<2) return;
    setCoachLoading(true); setCoach(null);
    const eq = calcEquity(playerCards, comm, activeAiCount||1);
    const o  = comm.length>=3 ? calcOuts(playerCards, comm) : null;
    const n  = comm.length>=3 ? calcNuts(comm) : null;
    getCoachAnalysis(playerCards, comm, eq, o, n, potRef.current, orbitRef.current.curBet, orbitRef.current.playerStreetBet, playerChips)
      .then(c=>{ setCoach(c); setCoachLoading(false); })
      .catch(()=>setCoachLoading(false));
  }, [phase]);

  // ══════════════════════════════════════════
  // BETTING ORBIT ENGINE
  // ══════════════════════════════════════════

  // Build the ordered seat list for a betting round.
  // Preflop:  action starts at UTG = (dealer+3)%6, ends at BB (dealer+2).
  // Postflop: action starts at first active seat left of dealer = (dealer+1)%6.
  function buildActionOrder(dealer, isPreflop, curAis, pFolded) {
    const seats = [];
    const start = isPreflop ? dealer + 3 : dealer + 1;
    for(let i = 0; i < 6; i++) {
      const s = (start + i) % 6;
      if(s === PLAYER_SEAT) {
        if(!pFolded) seats.push(s);
      } else {
        const ai = curAis[s];
        if(ai && !ai.folded) seats.push(s);
      }
    }
    return seats;
  }

  // After a raise: everyone except the raiser must act again.
  // Seats are ordered starting from the seat immediately after the raiser.
  function rebuildAfterRaise(raiserSeat, curAis, pFolded) {
    const seats = [];
    for(let i = 1; i <= 5; i++) {
      const s = (raiserSeat + i) % 6;
      if(s === PLAYER_SEAT) {
        if(!pFolded) seats.push(s);
      } else {
        const ai = curAis[s];
        if(ai && !ai.folded) seats.push(s);
      }
    }
    return seats;
  }

  // Core orbit loop. Processes seats in toAct one by one.
  // When it hits the player's seat it pauses (returns) and waits for a button press.
  // When toAct is empty the betting round is over → advance the street.
  async function runOrbit() {
    const orbit = orbitRef.current;

    while(orbit.toAct.length > 0) {
      const pFolded = orbit.pFolded;
      const curAis  = aisRef.current;

      // If only one player remains, end hand immediately
      const activeTotal = (pFolded ? 0 : 1) + curAis.filter(a=>!a.folded).length;
      if(activeTotal <= 1) { doShowdown(); return; }

      const seat = orbit.toAct[0];

      // ── Player's turn: pause and show buttons ──
      if(seat === PLAYER_SEAT) {
        setCurBet(orbit.curBet);
        setPlayerBet(orbit.playerStreetBet);
        setRaiseAmt(Math.min(Math.max(orbit.curBet * 2, BB * 3), playerChips));
        setWaiting(true);
        return; // resume when player calls onFold/onCall/onRaise
      }

      // ── AI's turn ──
      orbit.toAct.shift();
      const aiIdx = seat;
      const ai    = curAis[aiIdx];
      if(!ai || ai.folded) continue;

      // Thinking animation + personality delay
      setAis(prev => prev.map((a,j) => j===aiIdx ? {...a, thinking:true} : a));
      const base = {gpt4:280, gemini:750, llama:180, claude:580, grok:220}[ai.id] || 400;
      await new Promise(r => setTimeout(r, base + Math.random() * 600));

      let dec;
      try {
        dec = getAiMove(ai, commRef.current, potRef.current, orbit.curBet);
      } catch(e) {
        console.error('AI decision error:', e);
        dec = { action:'call', amount:0, comment:'...' };
      }
      let up = {...ai, thinking:false};

      if(dec.action === 'fold') {
        const log = [...(ai.decisionLog||[]), {street:commRef.current.length===0?'pre':commRef.current.length===3?'flop':commRef.current.length===4?'turn':'river', action:'fold', why:dec._why||''}].slice(-8);
        up = {...up, folded:true, lastAction:'fold', comment:dec.comment, decisionLog:log};
        const newAis = aisRef.current.map((a,j) => j===aiIdx ? up : a);
        setAis(newAis); aisRef.current = newAis;

      } else if(dec.action === 'raise' && dec.amount > orbit.curBet) {
        const rt = Math.min(+dec.amount, ai.chips + ai.bet);
        const ex = rt - ai.bet;
        if(ex > 0 && ex <= ai.chips) {
          // Valid raise → update orbit's curBet and re-open action for everyone else
          orbit.curBet = rt;
          const cp = potRef.current + ex;
          setPot(cp); potRef.current = cp; setCurBet(rt);
          const logR = [...(ai.decisionLog||[]), {street:commRef.current.length===0?'pre':commRef.current.length===3?'flop':commRef.current.length===4?'turn':'river', action:`raise ${rt}`, why:dec._why||''}].slice(-8);
          up = {...up, bet:rt, chips:ai.chips-ex, lastAction:'raise', comment:dec.comment, decisionLog:logR};
          const newAis = aisRef.current.map((a,j) => j===aiIdx ? up : a);
          setAis(newAis); aisRef.current = newAis;
          // Re-open: everyone else (including player if not folded) must act again
          orbit.toAct = rebuildAfterRaise(aiIdx, aisRef.current, orbit.pFolded);
        } else {
          // Can't afford the raise → call instead
          const tc = Math.min(Math.max(0, orbit.curBet - ai.bet), ai.chips);
          const cp = potRef.current + tc;
          setPot(cp); potRef.current = cp;
          up = {...up, bet:ai.bet+tc, chips:ai.chips-tc, lastAction:'call', comment:dec.comment};
          const newAis = aisRef.current.map((a,j) => j===aiIdx ? up : a);
          setAis(newAis); aisRef.current = newAis;
        }

      } else {
        // Call or check
        const tc = Math.min(Math.max(0, orbit.curBet - ai.bet), ai.chips);
        const cp = potRef.current + tc;
        setPot(cp); potRef.current = cp;
        const isCheck = tc === 0;
        const logC = [...(ai.decisionLog||[]), {street:commRef.current.length===0?'pre':commRef.current.length===3?'flop':commRef.current.length===4?'turn':'river', action:isCheck?'check':'call', why:dec._why||''}].slice(-8);
        up = {...up, bet:ai.bet+tc, chips:ai.chips-tc, lastAction:'call', comment: isCheck ? '' : dec.comment, decisionLog:logC};
        const newAis = aisRef.current.map((a,j) => j===aiIdx ? up : a);
        setAis(newAis); aisRef.current = newAis;
      }
    }

    // All seats acted and all bets are equal → advance to next street
    advanceStreet();
  }

  // Deal community cards and start the next betting round (or showdown).
  function advanceStreet() {
    const orbit  = orbitRef.current;
    const pFolded = orbit.pFolded;
    const dealer = dealerPosRef.current;

    // Check if hand is already over
    const activeTotal = (pFolded ? 0 : 1) + aisRef.current.filter(a=>!a.folded).length;
    if(activeTotal <= 1) { doShowdown(); return; }

    // Reset all street bets
    const resetAis = aisRef.current.map(a => ({...a, bet:0}));
    setAis(resetAis); aisRef.current = resetAis;
    setPlayerBet(0); setCurBet(0);
    orbit.playerStreetBet = 0; orbit.curBet = 0;

    const deck = deckRef.current;
    const cur  = commRef.current;

    if(cur.length === 0) {
      // Deal flop
      const flop = [deck[0],deck[1],deck[2]]; deckRef.current = deck.slice(3);
      commRef.current = flop; setComm(flop); setPhase('flop');
      orbit.toAct = buildActionOrder(dealer, false, aisRef.current, pFolded);
      runOrbit();
    } else if(cur.length === 3) {
      // Deal turn
      const turn = [deck[0]]; deckRef.current = deck.slice(1);
      const newComm = [...cur,...turn]; commRef.current = newComm; setComm(newComm); setPhase('turn');
      orbit.toAct = buildActionOrder(dealer, false, aisRef.current, pFolded);
      runOrbit();
    } else if(cur.length === 4) {
      // Deal river
      const river = [deck[0]]; deckRef.current = deck.slice(1);
      const newComm = [...cur,...river]; commRef.current = newComm; setComm(newComm); setPhase('river');
      orbit.toAct = buildActionOrder(dealer, false, aisRef.current, pFolded);
      runOrbit();
    } else {
      // All 5 community cards dealt → showdown
      doShowdown();
    }
  }

  // ══════════════════════════════════════════
  // START HAND
  // ══════════════════════════════════════════
  async function startHand() {
    const newDealer = (dealerPosRef.current + 1) % 6;
    setDealerPos(newDealer); dealerPosRef.current = newDealer;

    const sbSeat = (newDealer + 1) % 6;
    const bbSeat = (newDealer + 2) % 6;

    const deck = shuffle(fullDeck()); let idx = 0;
    const pCards = [deck[idx++], deck[idx++]];
    const chipMap = Object.fromEntries(aisRef.current.map(a => [a.id, a.chips]));

    // Build AIs: post blinds, assign position tokens
    const newAis = AI_CONFIGS.map((cfg, i) => {
      let pos = null;
      if(i === newDealer) pos = 'D';
      else if(i === sbSeat) pos = 'SB';
      else if(i === bbSeat) pos = 'BB';
      const isSB = i === sbSeat, isBB = i === bbSeat;
      const prev = chipMap[cfg.id] ?? cfg.chips;
      return {
        ...cfg,
        chips: prev - (isSB?SB:0) - (isBB?BB:0),
        bet:   isSB?SB : isBB?BB : 0,
        cards: [deck[idx++], deck[idx++]],
        folded:false, thinking:false,
        lastAction: (isSB||isBB) ? 'blind' : null,
        comment: isSB?`小盲 ${SB}` : isBB?`大盲 ${BB}` : '',
        showCards:false, pos
      };
    });

    // Player's position & blind obligation
    let playerPos = null;
    if(PLAYER_SEAT === newDealer) playerPos = 'D';
    else if(PLAYER_SEAT === sbSeat) playerPos = 'SB';
    else if(PLAYER_SEAT === bbSeat) playerPos = 'BB';
    const playerIsSB = PLAYER_SEAT === sbSeat;
    const playerIsBB = PLAYER_SEAT === bbSeat;
    const playerBlind = playerIsSB ? SB : playerIsBB ? BB : 0;

    deckRef.current = deck.slice(idx);
    const hn = handNum + 1; setHandNum(hn);
    setPlayerCards(pCards); setAis(newAis); aisRef.current = newAis;
    setComm([]); commRef.current = [];
    setPlayerFolded(false); setResult(null); setWaiting(false);
    setCoach(null); setEquity(null); setOuts(null); setNuts(null); setBetAdvice(null);
    setTab('analysis'); setCurrentPlayerPos(playerPos); setRaiseBtnLabel(null);

    const initPot = SB + BB;
    setPot(initPot); potRef.current = initPot;
    setPlayerBet(playerBlind); setCurBet(BB);
    setPlayerChips(p => p - playerBlind);
    setPhase('preflop');

    // Set up preflop orbit: action starts at UTG (dealer+3), ends at BB (dealer+2)
    // BB already has BB chips in, so their playerStreetBet = BB (or 0 if it's another player)
    orbitRef.current = {
      toAct: buildActionOrder(newDealer, true, newAis, false),
      curBet: BB,
      playerStreetBet: playerBlind,
      pFolded: false
    };

    await runOrbit();
  }

  // ══════════════════════════════════════════
  // PLAYER ACTIONS (resume orbit after button press)
  // ══════════════════════════════════════════
  async function onFold() {
    if(!waiting || playerFolded) return;
    setWaiting(false);
    setPlayerFolded(true);
    const orbit = orbitRef.current;
    orbit.pFolded = true;
    orbit.toAct = orbit.toAct.filter(s => s !== PLAYER_SEAT);
    // If only one remains, end immediately
    if(aisRef.current.filter(a=>!a.folded).length <= 1) { doShowdown(); return; }
    await runOrbit();
  }

  async function onCall() {
    if(!waiting || playerFolded) return;
    setWaiting(false);
    const orbit = orbitRef.current;
    const tc = Math.min(Math.max(0, orbit.curBet - orbit.playerStreetBet), playerChips);
    orbit.playerStreetBet += tc;
    setPlayerBet(orbit.playerStreetBet);
    setPlayerChips(p => p - tc);
    const np = potRef.current + tc; setPot(np); potRef.current = np;
    orbit.toAct = orbit.toAct.filter(s => s !== PLAYER_SEAT);
    await runOrbit();
  }

  async function onRaise() {
    if(!waiting || playerFolded) return;
    const orbit   = orbitRef.current;
    const total   = Math.min(raiseAmt, playerChips);
    if(total <= orbit.curBet) return; // must be a valid raise
    setWaiting(false);
    const extra = total - orbit.playerStreetBet;
    setPlayerChips(p => p - extra);
    orbit.playerStreetBet = total;
    setPlayerBet(total);
    orbit.curBet = total;
    setCurBet(total);
    const np = potRef.current + extra; setPot(np); potRef.current = np;
    // Re-open: all other active seats must respond
    orbit.toAct = rebuildAfterRaise(PLAYER_SEAT, aisRef.current, orbit.pFolded);
    await runOrbit();
  }

  // ══════════════════════════════════════════
  // SHOWDOWN
  // ══════════════════════════════════════════
  function doShowdown() {
    const pFolded   = orbitRef.current.pFolded;
    const commCards = commRef.current;
    setPhase('showdown'); setWaiting(false);
    setAis(prev => prev.map(a => ({...a, showCards:!a.folded})));
    const fp = potRef.current;

    const activePlayers = [
      ...(!pFolded ? [{id:'player',name:'你',score:evalHand([...playerCards,...commCards]),cards:playerCards}] : []),
      ...aisRef.current.filter(a=>!a.folded).map(a=>({id:a.id,name:a.name,color:a.color,score:evalHand([...a.cards,...commCards]),cards:a.cards}))
    ];

    if(activePlayers.length === 0) { setPot(0); potRef.current=0; return; }

    if(activePlayers.length === 1) {
      // Everyone else folded
      const w = activePlayers[0];
      if(w.id === 'player') { setPlayerChips(p=>p+fp); setResult({winner:'player',amount:fp,handName:'对手全部弃牌'}); }
      else { setAis(prev=>prev.map(a=>a.id===w.id?{...a,chips:a.chips+fp}:a)); setResult({winner:w.name,color:w.color,amount:fp,handName:'对手弃牌'}); }
    } else {
      activePlayers.sort((a,b) => b.score.r - a.score.r);
      const w = activePlayers[0];
      if(w.id === 'player') { setPlayerChips(p=>p+fp); setResult({winner:'player',amount:fp,handName:w.score.n}); }
      else { setAis(prev=>prev.map(a=>a.id===w.id?{...a,chips:a.chips+fp}:a)); setResult({winner:w.name,color:w.color,amount:fp,handName:w.score.n}); }
    }
    setPot(0); potRef.current = 0;

    // Record to hand history
    setHandHistory(prev => [{
      handNum: handNum,
      comm: commRef.current,
      result: null,  // will be set by caller when result is known
      ais: aisRef.current.map(a => ({id:a.id, name:a.name, emoji:a.emoji, color:a.color, cards:a.cards, folded:a.folded, chips:a.chips, decisionLog:a.decisionLog||[]})),
      playerCards: playerCards,
      pot: potRef.current
    }, ...prev].slice(0, 10));
  }

  // ── Derived ──
  const canCheck  = curBet===0||curBet===playerBet;
  const toCall    = Math.min(Math.max(0,curBet-playerBet),playerChips);
  const handInfo  = playerCards.length>0 ? evalHand([...playerCards,...comm]) : null;
  const PHASE_CN  = {lobby:'大厅',preflop:'翻牌前',flop:'翻牌圈',turn:'转牌圈',river:'河牌圈',showdown:'摊牌'};
  const eqColor   = equity==null?'#888':equity>=60?'#44CC77':equity>=42?'#FFD700':'#FF6655';

  return (

        @keyframes slidein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
        @keyframes foldback{from{transform:translateX(0) scale(1);opacity:0.9} to{transform:translateX(14px) scale(0.75);opacity:0}}
        .deal{animation:deal .4s cubic-bezier(.34,1.5,.64,1) both}
        .pop{animation:pop .4s cubic-bezier(.34,1.5,.64,1) both}
        .in{animation:slidein .3s ease both}
        .seat-folded-cards{animation:foldback .45s cubic-bezier(.4,0,.6,1) forwards}
        button:active{opacity:.75;transition:opacity .08s}

        ::-webkit-scrollbar-thumb{background:#1a3020;border-radius:2px}
      `}</style>
